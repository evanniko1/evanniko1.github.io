<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex,follow" />
  <title>Message sent · Evangelos-Marios Nikolados</title>
  <link rel="icon" href="images/favicon.ico" sizes="any" />
  <link rel="stylesheet" href="main.css" />
  <meta id="theme-color" name="theme-color" content="#fafafa" />
  <script>
    (() => {
      let theme = 'light';
      try {
        const storedTheme = localStorage.getItem('theme');
        theme = storedTheme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      } catch (_) {
        theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.dataset.theme = theme;
    })();
  </script>
</head>
<body>
  <main class="content">
    <header>
      <h1>Evangelos-Marios Nikolados</h1>
      <button id="theme-toggle" aria-label="Toggle dark mode" aria-pressed="false">Dark mode</button>
    </header>
    <section id="contact">
      <h3>Message sent</h3>
      <p>Thank you for getting in touch. I will respond as soon as I can.</p>
      <p><a href="/">Return to the homepage</a></p>
    </section>
  </main>
  <script src="scripts/theme.js"></script>
</body>
</html>
