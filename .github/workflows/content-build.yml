name: content-build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "content/site.json"
      - "scripts/build-site.js"
      - ".github/workflows/content-build.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate index
        run: node scripts/build-site.js

      - name: Commit generated page if changed
        run: |
          git add index.html
          if ! git diff --staged --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore(content): rebuild portfolio sections"
            git push
          else
            echo "Generated page is already current"
          fi
